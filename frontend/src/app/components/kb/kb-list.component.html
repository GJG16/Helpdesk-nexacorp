<div class="flex flex-col h-full space-y-6">
  <!-- Header -->
  <div class="bg-blue-600 text-white p-8 rounded-xl shadow-lg relative overflow-hidden">
    <!-- Decoración de fondo -->
    <div class="absolute top-0 right-0 -mt-4 -mr-4 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl"></div>
    <div class="absolute bottom-0 left-0 -mb-4 -ml-4 w-24 h-24 bg-blue-400 opacity-20 rounded-full blur-xl"></div>
    
    <div class="relative z-10 flex flex-col md:flex-row justify-between items-center text-center md:text-left">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight">Centro de Ayuda</h1>
        <p class="mt-2 text-blue-100 max-w-xl">Encuentra respuestas rápidas, manuales y soluciones a problemas comunes antes de abrir un ticket.</p>
      </div>
      <div *ngIf="authService.isAdmin() || authService.isAgent()" class="mt-4 md:mt-0">
        <!-- En un entorno real, redirigiría a un formulario de creación -->
        <app-button variant="secondary" class="bg-white text-blue-600 hover:bg-slate-50">
          + Nuevo Artículo
        </app-button>
      </div>
    </div>

    <!-- Buscador -->
    <div class="mt-8 relative max-w-2xl mx-auto md:mx-0">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input type="text" [(ngModel)]="searchTerm" (input)="onSearch()" placeholder="Busca un error, cómo configurar el VPN, etc..."
        class="block w-full pl-11 pr-4 py-3 border-0 rounded-lg shadow-sm text-slate-900 focus:ring-2 focus:ring-blue-300 transition-all text-base" />
    </div>
  </div>

  <!-- Resultados de artículos -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    
    <!-- Loading -->
    <ng-container *ngIf="loading">
      <div *ngFor="let i of [1,2,3,4,5,6]" class="bg-white dark:bg-slate-900 rounded-lg p-6 shadow-sm border border-slate-200 dark:border-slate-800">
        <app-skeleton type="text" height="1.5rem" width="80%" class="mb-4"></app-skeleton>
        <app-skeleton type="text" height="0.8rem" width="100%" class="mb-2"></app-skeleton>
        <app-skeleton type="text" height="0.8rem" width="90%"></app-skeleton>
      </div>
    </ng-container>

    <!-- Artículos -->
    <ng-container *ngIf="!loading">
      <div *ngFor="let article of filteredArticles" class="bg-white dark:bg-slate-950 rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-800 hover:shadow-md transition-shadow group relative flex flex-col h-full">
        <div class="flex-1">
          <div class="flex justify-between items-start mb-3">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold tracking-wider uppercase bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400">
              {{ article.categoria || 'Guía' }}
            </span>
            <button *ngIf="authService.isAdmin()" (click)="deleteArticle(article.id)" class="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </button>
          </div>
          
          <a [routerLink]="['/kb', article.id]" class="block group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2 line-clamp-2">{{ article.titulo }}</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 line-clamp-3" [innerHTML]="article.contenido | slice:0:150"></p>
          </a>
        </div>
        
        <div class="mt-4 pt-4 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between text-xs text-slate-400">
          <div class="flex items-center">
            <svg class="w-3.5 h-3.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
            {{ article.vistas }} vistas
          </div>
          <div class="font-medium text-blue-500 group-hover:underline cursor-pointer" [routerLink]="['/kb', article.id]">Leer más &rarr;</div>
        </div>
      </div>
    </ng-container>

  </div>

  <div *ngIf="!loading && filteredArticles.length === 0" class="flex flex-col items-center justify-center p-12 text-center bg-white dark:bg-slate-950 rounded-lg shadow-sm border border-slate-200 dark:border-slate-800">
    <div class="text-5xl mb-4">🔍</div>
    <h3 class="text-lg font-medium text-slate-900 dark:text-white">No se encontraron artículos</h3>
    <p class="text-slate-500 mt-1">Intenta con otros términos de búsqueda.</p>
  </div>
</div>
