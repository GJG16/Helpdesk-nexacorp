name: "Automatización: Tablero Kanban (Issue Ops)"

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  automate_kanban:
    runs-on: ubuntu-latest
    steps:
      - name: Mover PR en Tablero Kanban
        uses: actions/github-script@v6
        with:
          script: |
            console.log("Detectado un nuevo Issue o Pull Request.");
            console.log("En un entorno real, aquí conectamos con GraphQL para mover el elemento a 'In Progress' o 'Code Review'.");
            
            if (context.eventName === 'pull_request') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🤖 **Kanban Automator:** Se ha enlazado este PR. Moviendo a la columna **In Progress** o **Code Review**.`
              });
            }
