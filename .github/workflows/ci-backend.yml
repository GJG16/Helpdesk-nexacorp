name: CI Backend (FastAPI)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Configuramos el directorio de trabajo asumiendo que el código está en la carpeta 'backend'
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Análisis de código estático (Linter) con flake8
      run: |
        # Detiene el build si hay errores de sintaxis en Python
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Las alertas de formato se tratan como advertencias
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Ejecutar pruebas unitarias con pytest
      run: |
        pytest
