<div class="form-container">
  <div class="form-card">
    <h2>{{ isEditMode ? 'Editar' : 'Crear' }} Ticket</h2>

    <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()">
      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <div class="form-group">
        <label for="titulo">Título *</label>
        <input
          type="text"
          id="titulo"
          formControlName="titulo"
          placeholder="Ingresa el título del ticket"
          [class.is-invalid]="f['titulo'].invalid && f['titulo'].touched"
        />
        <div *ngIf="f['titulo'].invalid && f['titulo'].touched" class="invalid-feedback">
          <div *ngIf="f['titulo'].errors?.['required']">El título es requerido</div>
          <div *ngIf="f['titulo'].errors?.['minlength']">Mínimo 5 caracteres</div>
        </div>
      </div>

      <div class="form-group">
        <label for="descripcion">Descripción *</label>
        <textarea
          id="descripcion"
          formControlName="descripcion"
          placeholder="Describe el problema en detalle"
          rows="5"
          [class.is-invalid]="f['descripcion'].invalid && f['descripcion'].touched"
        ></textarea>
        <div *ngIf="f['descripcion'].invalid && f['descripcion'].touched" class="invalid-feedback">
          <div *ngIf="f['descripcion'].errors?.['required']">La descripción es requerida</div>
          <div *ngIf="f['descripcion'].errors?.['minlength']">Mínimo 10 caracteres</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="prioridad">Prioridad *</label>
          <select
            id="prioridad"
            formControlName="prioridad"
            [class.is-invalid]="f['prioridad'].invalid && f['prioridad'].touched"
          >
            <option value="baja">Baja</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
            <option value="critica">Crítica</option>
          </select>
        </div>

        <div class="form-group">
          <label for="estado">Estado *</label>
          <select
            id="estado"
            formControlName="estado"
            [class.is-invalid]="f['estado'].invalid && f['estado'].touched"
          >
            <option value="abierto">Abierto</option>
            <option value="en_progreso">En Progreso</option>
            <option value="resuelto">Resuelto</option>
            <option value="cerrado">Cerrado</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Guardando...' : (isEditMode ? 'Actualizar' : 'Crear') }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="cancel()">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
