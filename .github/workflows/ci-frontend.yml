name: CI Frontend (Angular)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Configuramos el directorio de trabajo asumiendo que el código está en la carpeta 'frontend'
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x' # Versión estable compatible con versiones recientes de Angular
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Instalar dependencias
      run: npm install --legacy-peer-deps

    - name: Compilar aplicación (Build)
      run: npm run build --if-present

    - name: Ejecutar pruebas (Opcional, si tienes configurado Karma/Jasmine)
      run: npm run test -- --watch=false --browsers=ChromeHeadless
      continue-on-error: true # Permite que continúe si no hay pruebas configuradas aún
